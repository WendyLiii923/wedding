<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Wedding Quest</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- 第一畫面 -->
    <section id="intro">
      <!-- 背景 -->
      <div class="bg"></div>

      <!-- 柔光霧 -->
      <div class="mist"></div>

      <!-- 螢火蟲 -->
      <canvas id="c"></canvas>

      <!-- 文字 -->
      <div class="quest-text">
        <div class="quest-title-row">
          <div class="quest-title">主線任務已解鎖</div>
        </div>

        <div class="mission-decoration">
          <img src="assets/img/Mission-Line.svg" class="mission-line" />

          <img src="assets/img/Mission-Diamond.svg" class="mission-diamond" />

          <img src="assets/img/Mission-Line.svg" class="mission-line" />
        </div>
      </div>

      <!-- 音樂 -->
      <button id="musicBtn">🔇</button>
      <audio id="bgm" loop>
        <source src="./assets/audio/Toy Piano.mp3" type="audio/mpeg" />
      </audio>
    </section>

    <!-- inner js -->
    <script src="js/fireflies.js"></script>
    <script src="js/main.js"></script>
    <!-- outer js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
